#Blue Shield
- type: entity
  id: SuitStorageBlueShield
  parent: SuitStorageBase
  suffix: Blue Shield
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillBlueShieldOfficerHardsuit
  - type: AccessReader
    access: [["Command"]]

#Explorer Suit
- type: entity
  id: SuitStorageExplorerSuit
  parent: SuitStorageBase
  suffix: Explorer Suit
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillSuitStorageExplorerSuit
  - type: AccessReader
    access: [["Salvage"]]

- type: entityTable
  id: FillSuitStorageExplorerSuit
  table: !type:AllSelector
    children:
    - id: OxygenTankFilled
    - id: ClothingOuterArmorExplorerSuit
    - id: ClothingMaskGasExplorer
