# Basic
- type: entity
  parent: CrateNecropolis
  id: CrateNecropolisFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: BasicNecropolisCrateTable

- type: entityTable
  id: BasicNecropolisCrateTable
  table: !type:GroupSelector
    children:
    - id: BloodCultSoulStone
    - id: DarkShard
    - id: ClothingHandsGlovesConcussiveGauntlets
    - id: WeaponPossessedBlade
    - id: ClothingOuterArmorCult
    - id: DrinkUnholyFlaskFull
    - id: ArmBlade
    - id: RodOfAsclepius
    - id: CardTarotNotEnchanted
    - id: ShipInBottle
    - id: DustyShard
    - id: CubeRed # He will create the second cube himself
    - id: PKAUpgradeFireRate
    - id: PKAUpgradeDamage
    - id: PKAUpgradeLifesteal
    - !type:NestedSelector
      tableId: MagmiteGearTable

- type: entityTable
  id: MagmiteGearTable
  table: !type:GroupSelector
    children:
    - id: WeaponMagmiteProtoKineticAccelerator
    - id: WeaponMagmiteCrusher
    - id: WeaponMagmiteCrusherGlaive
    - id: WeaponMagmitePlasmaCutter
    - id: WeaponMagmiteFanPlasmaCutter

