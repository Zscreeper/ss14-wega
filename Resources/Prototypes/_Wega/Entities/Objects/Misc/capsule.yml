    delay: 5

- type: entity
  parent: HandCapsule
  id: HandLuxuriousCapsule
  name: luxurious hand capsule
  description: "Your good friend, who saves you when you need it. But more serious."
  components:
  - type: Sprite
    state: gold_capsule
  - type: HandCapsule
    capsulePath: "/Maps/_Wega/Lavaland/luxuriouscapsule.yml"
