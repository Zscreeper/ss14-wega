- type: entity
  parent: BaseItem
  id: HandCapsule
  name: hand capsule
  description: "Your good friend, who saves you when you need it."
  components:
  - type: Sprite
    sprite: _Wega/Objects/Misc/capsule.rsi
    state: capsule
  - type: HandCapsule
    capsulePath: "/Maps/_Wega/Lavaland/capsule.yml"
