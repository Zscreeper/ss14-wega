# Eng rare
- type: entity
  id: RCDCombatRecharging
  parent: RCD
  name: experimental RCD combat
  description: Cyborg-mounted Rapid Construction Device which creates compressed matter on the fly using an internal fabricator.
  suffix: AutoRecharge
  components:
  - type: LimitedCharges
    maxCharges: 40
  - type: AutoRecharge
    rechargeDuration: 10
  - type: RCD
    reinforced: true
    availablePrototypes:
    - WallSolid
    - WallReinforced
    - FloorSteel
    - Plating
    - Catwalk
    - Grille
    - Window
    - WindowDirectional
    - WindowReinforcedDirectional
    - ReinforcedWindow
    - Airlock
    - AirlockGlass
    - Firelock
    - TubeLight
    - BulbLight
    - LVCable
    - MVCable
    - HVCable
    - CableTerminal
    - SurveillanceCameraGeneral
    - Deconstruct
  - type: Sprite
    sprite: _Wega/Objects/Tools/combat-rcd.rsi
    state: icon
  - type: Clothing
    sprite: _Wega/Objects/Tools/combat-rcd.rsi
    quickEquip: false
    slots:
    - Belt
  - type: StaticPrice
    price: 1000

