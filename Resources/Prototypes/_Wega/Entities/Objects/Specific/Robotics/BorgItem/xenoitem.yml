# xenoborgs
- type: entity
  parent: RepeirModeDevice
  id: RepeirModeDeviceXenoborg
  components:
  - type: ComponentToggler
    parent: true
    components:
    - type: PassiveDamage
      allowedStates:
      - Alive
      - Critical
      - Dead
      damage:
        types:
          Blunt: -2
          Piercing: -3
          Heat: -3
  - type: PowerCellDraw
    drawRate: 72 # 10 seconds
  - type: ToggleCellDraw
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmallNuclear
        disableEject: true
        swap: false

