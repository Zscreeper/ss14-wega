- type: entity
  parent: BaseBullet
  id: ProjectileBloodBolt
  name: ""
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: blood_bolt
  - type: Projectile
    damage:
      types:
        Bloodloss: 12
        Blunt: 3
  - type: SolutionContainerManager
    solutions:
      bolt:
        maxVol: 1.5
        reagents:
        - ReagentId: HemorrhinolBloodCult
          Quantity: 1.5
  - type: SolutionInjectOnProjectileHit
    transferAmount: 1.5
    solution: bolt

- type: entity
  parent: BaseBullet
  id: BulletMagmaCharge
  name: charge bolt
  description: Marks a target for additional damage.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: magmabolt
        shader: unshaded
  - type: DamageMarkerOnCollide
    whitelist:
      components:
        - MobState
    damage:
      types:
        Blunt: 20
        Slash: 5
  - type: ProjectilePressure # Corvax-Wega-Lavaland
  - type: GatheringProjectile
    amount: 4
  - type: Projectile
    deleteOnCollide: false
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 0
        Structural: 50
  - type: TimedDespawn
    lifetime: 0.4

- type: entity
  parent: BaseBullet
  id: ProjectileSpellStaff
  name: ""
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: lavastaff
  - type: Projectile
    damage:
      types:
        Slash: 15
