- type: entity
  id: BulletPlasmaCutter
  name: cutter bolt
  parent: BaseBullet
  description: A projectile of dectruction energy.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/bullet_cutter.rsi
    color: "#03deff"
    layers:
    - state: plasma
      shader: unshaded
  - type: GatheringProjectile
    amount: 4
  - type: Projectile
    deleteOnCollide: false
    penetrationThreshold: 900
    damage:
      types:
        Heat: 2.5
        Structural: 30
    penetrationDamageTypeRequirement:
    - Structural
  - type: StaminaDamageOnCollide
    damage: 1
  - type: TimedDespawn
    lifetime: 0.2
  - type: PointLight
    energy: 4
    radius: 2
    color: blue

- type: entity
  parent: BulletPlasmaCutter
  id: BulletPlasmaCutterAdv
  name: cutter bolt
  description: A projectile of dectruction energy.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    color: "#ffffff"
  - type: TimedDespawn
    lifetime: 0.4
  - type: PointLight
    color: violet

- type: entity
  parent: BulletPlasmaCutter
  id: BulletPlasmaCutterMagma
  name: cutter bolt
  description: A projectile of dectruction energy.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    color: red
  - type: TimedDespawn
    lifetime: 0.6
  - type: PointLight
    color: red
  - type: Projectile
    damage:
      types:
        Heat: 2.5
        Structural: 60

- type: entity
  name: plasma cutter barrage
  id: BulletPlasmaCutterSpreadNarrow
  categories: [ HideSpawnMenu ]
  parent: BulletPlasmaCutter
  components:
  - type: ProjectileSpread
    proto: BulletPlasmaCutter
    count: 4
    spread: 10

- type: entity
  name: plasma cutter barrage
  id: BulletPlasmaCutterMagmaSpreadNarrow
  categories: [ HideSpawnMenu ]
  parent: BulletPlasmaCutterMagma
  components:
  - type: ProjectileSpread
    proto: BulletPlasmaCutterMagma
    count: 4
    spread: 10
