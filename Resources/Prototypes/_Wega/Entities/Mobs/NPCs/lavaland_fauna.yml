- type: entity
  id: BaseMobLavaland
  parent:
  - BaseMob
  - MobDamageable
  - MobAtmosExposed
  - MobCombat
  suffix: AI
  abstract: true
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 15
      behaviors:
      - !type:PopupBehavior
        popup: mouth-taste-metal
        popupType: LargeCaution
        targetOnly: true
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 40
      behaviors:
      - !type:VomitBehavior
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
      Acidic: [Touch, Ingestion]
  - type: Climbing
  - type: NameIdentifier
    group: GenericNumber
  - type: StatusEffects
    allowed:
    - Electrocution
    - TemporaryBlindness
    - RadiationProtection
    - Adrenaline
  - type: StandingState
  - type: Tag
    tags:
    - DoorBumpOpener
    - StunImmune
  - type: LavalandVisitor
    immuneToStorm: true
  - type: Unrevivable # If his dead - his is dead
    analyzable: false
  - type: NPCAggression
  - type: NpcFactionMember
    factions:
    - LavalandFauna

