#region Goliath
- type: entity
  id: BaseMobGoliath
  parent: [ BaseMobLavaland, MobBloodstream ]
  name: goliath
  description: A massive beast that uses long tentacles to ensnare its prey, threatening them is not advised under any conditions.
  abstract: true
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Lavaland/goliath.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: goliath1
  - type: DamageStateVisuals
    states:
      Alive:
        Base: goliath1
      Dead:
        Base: goliath_dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 350
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      125: 0.75
  - type: MeleeWeapon
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
    angle: 0
    attackRate: 0.75
    animation: WeaponArcPunch
    damage:
      types:
        Slash: 15
  - type: HTN
    constantlyReplan: false
    rootTask:
      task: GoliathCompound
    blackboard:
      VisionRadius: !type:Single
        9
      AggroVisionRadius: !type:Single
        9
      NavSmash: !type:Bool
        true
  - type: NPCUseActionOnTarget
    actionId: ActionGoliathTentacle
  - type: Tag
    tags:
    - CannotSuicide
    - Goliath
    - FootstepSound
    - StunImmune
  - type: NoSlip
  - type: Butcherable
    spawned:
    - id: FoodMeatGoliath
      amount: 2
    - id: MaterialGoliathHide1
      amount: 2
    - id: MaterialBones1
      amount: 2
  - type: TrophyHunter
    trophy: TrophyLavalandGoliathTentacle

- type: entity
  id: MobGoliath
  parent: BaseMobGoliath
  name: goliath
  description: A massive beast that uses long tentacles to ensnare its prey, threatening them is not advised under any conditions.
  components:
  - type: RandomSprite
    available:
      - enum.DamageStateVisualLayers.Base:
          goliath1: ""
          goliath2: ""

- type: entity
  id: MobAncientGoliath
  parent: BaseMobGoliath
  name: ancient goliath
  description: A very ancient creature that has existed since time immemorial due to its ability to stay young.
  components:
  - type: Sprite
    sprite: Mobs/Aliens/Asteroid/goliath.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: goliath
  - type: DamageStateVisuals
    states:
      Alive:
        Base: goliath
      Dead:
        Base: goliath_dead
  - type: MobThresholds
    thresholds:
      0: Alive
      400: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      250: 0.75
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.235
    baseSprintSpeed: 2.235
  - type: TrophyHunter
    trophy: TrophyLavalandAncientGoliathTentacle
    dropChance: 0.45 # More chance because he ancient
#endregion

