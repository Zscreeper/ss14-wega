    jumpsuit: ClothingUniformJumpsuitColorWhite
    mask: ClothingMaskBreathMedical
    shoes: ClothingShoesColorWhite
    gloves: ClothingHandsGlovesLatex
    underwearbottom: ClothingUnderBottomGrey
