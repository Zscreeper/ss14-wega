# Veterinarian
- type: entity
  parent: [ BaseMobHuman, BaseMobInhabitants ]
  id: MobHumanInhabitantTranslocatedVeterinarian
  name: veterinarian
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: NpcFactionMember
    factions:
      - Passive
  - type: HTN
    rootTask:
      task: IdleCompound
  - type: Loadout
