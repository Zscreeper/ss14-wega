- type: entity
  id: BaseMobInhabitants
  abstract: true
  components:
  - type: NPCIgnoringOptimize
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: Unrevivable
    analyzable: false

# Inhabitant Square
- type: entity
  parent: [ BaseMobHuman, BaseMobInhabitants ]
  id: MobHumanInhabitantSquare
  name: inhabitant of the square
  components:
  - type: NpcFactionMember
    factions:
      - AllHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: Loadout
    prototypes:
      - InhabitantSquareGear

- type: startingGear
  id: InhabitantSquareGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorBlack
    mask: ClothingMaskBreath
    shoes: ClothingShoesBootsWinter
    socks: ClothingUnderSocksBlackKnee
    underwearbottom: ClothingUnderBottomGrey
    head: ClothingHeadHatHoodWinterColorGray
    outerClothing: ClothingOuterWinterColorGray
    belt: DoubleEmergencyOxygenTankFilled
  inhand:
    - SpearReinforced

# Hermit
- type: entity
  parent: [ BaseMobHuman, BaseMobInhabitants ]
  id: MobHumanInhabitantHermit
  name: hermit
  components:
  - type: LavalandVisitor
    immuneToStorm: true # Otherwise, he would have died in the first storm.
  - type: Respirator # Formally, so that he feels good before the players arrive
    saturation: 8.0
    suffocationThreshold: -6.0
    maxSaturation: 8.0
    minSaturation: -4.0
    suffocationCycleThreshold: 6
    updateIntervalMultiplier: 0.8
  - type: NpcFactionMember
    factions:
      - AllHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: Loadout
    prototypes:
      - InhabitantHermitGear

- type: startingGear
  id: InhabitantHermitGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorGrey
    mask: ClothingMaskBreath
    shoes: ClothingShoesColorBlack
    underwearbottom: ClothingUnderBottomGrey
    head: ClothingHeadHelmetEVA
    outerClothing: ClothingOuterHardsuitEVA
    suitstorage: OxygenTankFilled

