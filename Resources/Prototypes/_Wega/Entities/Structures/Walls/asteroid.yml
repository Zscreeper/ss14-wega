- type: entity
  parent: BaseWall
  id: WallRockBasaltIndestructible
  suffix: Indestructible
  components:
  - type: Transform
    noRot: true
  - type: Icon
    sprite: Structures/Walls/rock.rsi
    state: rock_wall
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: MiningScannerViewable
  - type: SmoothEdge
  - type: Sprite
    sprite: Structures/Walls/rock.rsi
    layers:
    - state: rock_wall
    - map: [ "enum.EdgeLayer.South" ]
      state: rock_wall_south
    - map: [ "enum.EdgeLayer.East" ]
      state: rock_wall_east
    - map: [ "enum.EdgeLayer.North" ]
      state: rock_wall_north
    - map: [ "enum.EdgeLayer.West" ]
      state: rock_wall_west

- type: entity
  id: WallRockBasaltLavalandCoal
  parent: WallRockBasalt
  suffix: Coal, Lavaland
  components:
  - type: OreVein
    oreChance: 1.0
    currentOre: OreCoal
  - type: Sprite
    layers:
    - state: rock_wall
    - map: [ "enum.EdgeLayer.South" ]
      state: rock_wall_south
    - map: [ "enum.EdgeLayer.East" ]
      state: rock_wall_east
    - map: [ "enum.EdgeLayer.North" ]
      state: rock_wall_north
    - map: [ "enum.EdgeLayer.West" ]
      state: rock_wall_west
    - state: rock_coal
      map: [ "enum.MiningScannerVisualLayers.Overlay" ]
      visible: false

