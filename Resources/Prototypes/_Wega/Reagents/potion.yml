- type: reagent
  id: SlimeSteroid
  name: reagent-name-slime-steroid
  group: Narcotics
  desc: reagent-desc-slime-steroid
  flavor: bitter
  flavorMinimum: 0.05
  color: "#800080"
  physicalDesc: reagent-physical-desc-crystalline
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: -5
  - !type:PlantAdjustHealth
    amount: -1
  metabolisms:
    Bloodstream:
      effects:
      - !type:ChemReinforcedExtracts
        conditions:
        - !type:ReagentCondition
          reagent: SlimeSteroid
          min: 10
      - !type:GenericStatusEffect
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 16
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.1
        sprintSpeedModifier: 1.1
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: SlimeSteroid
          min: 20
        damage:
          types:
            Poison: 1
            Cellular: 0.5

